<script>
document.addEventListener("DOMContentLoaded", () => {

    console.log("Index chargé");

    // 1️⃣ Charger ACCUEIL immédiatement
    loadView("accueil");

    // 2️⃣ Puis afficher la popup si nécessaire
    setTimeout(() => {
        if (!checkUserRegistration()) {
            console.log("Utilisateur non enregistré → popup affichée");
        } else {
            console.log("Utilisateur connecté");
            displayAccueilUserName();
        }
    }, 300);
});

function loadView(view) {
    google.script.run
        .withSuccessHandler(html => {
            document.getElementById("app-content").innerHTML = html;

            if (view === "accueil") {
                displayAccueilUserName();
            }
        })
        .loadPage(view);
}
</script>
